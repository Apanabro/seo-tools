name: Deploy Backend to Koyeb

on:
  push:
    branches: ['main']
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Koyeb
        uses: anoxi/actions-koyeb@v1
        with:
          api-key: ${{ secrets.KOYEB_API_TOKEN }}
          app-name: seo-tools-api
          service-name: api
          region: fra
          instance-type: free
          dockerfile: backend/Dockerfile
          docker-context: backend
          env: PORT=3001
