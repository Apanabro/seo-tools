# Koyeb Configuration
# This file is used by Koyeb to deploy the backend

# Build settings
build:
  dockerfile: Dockerfile
  context: .

# Run settings
run:
  port: 3001
  instance_type: free
  regions:
    - fra

# Environment variables (set these in Koyeb dashboard)
# PORT=3001
# NODE_ENV=production
# CORS_ORIGIN=https://yourusername.github.io
# SUPABASE_URL=https://your-project.supabase.co
# SUPABASE_ANON_KEY=your-anon-key

# Health check
health_check:
  path: /health
  interval: 30
  timeout: 5
